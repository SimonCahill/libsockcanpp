name: Build and Pack (Ubuntu Versions)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  BUILD_TYPE: Release

jobs:
  build-and-pack:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.10
            image: ubuntu:24.10
            version: "24.10"
          - name: Ubuntu 24.04
            image: ubuntu:24.04
            version: "24.04"
          - name: Ubuntu 23.10
            image: ubuntu:23.10
            version: "23.10"
          - name: Ubuntu 23.04
            image: ubuntu:23.04
            version: "23.04"
          - name: Ubuntu 22.10
            image: ubuntu:22.10
            version: "22.10"
          - name: Ubuntu 22.04
            image: ubuntu:22.04
            version: "22.04"
          - name: Ubuntu 21.10
            image: ubuntu:21.10
            version: "21.10"
          - name: Ubuntu 21.04
            image: ubuntu:21.04
            version: "21.04"
          - name: Ubuntu 20.10
            image: ubuntu:20.10
            version: "20.10"
          - name: Ubuntu 20.04
            image: ubuntu:20.04
            version: "20.04"
          - name: Ubuntu 19.10
            image: ubuntu:19.10
            version: "19.10"
          - name: Ubuntu 19.04
            image: ubuntu:19.04
            version: "19.04"
          - name: Ubuntu 18.10
            image: ubuntu:18.10
            version: "18.10"
          - name: Ubuntu 18.04
            image: ubuntu:18.04
            version: "18.04"

    steps:
    - name: Prepare environment
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -euo pipefail
        if [[ -f /etc/os-release ]]; then
          . /etc/os-release
          if [[ "${ID}" == "ubuntu" ]]; then
            case "${VERSION_ID}" in
              18.04|18.10|19.04|19.10|20.10|21.04|21.10|22.10|23.04|23.10)
                sed -i 's|http://archive.ubuntu.com/ubuntu/|http://old-releases.ubuntu.com/ubuntu/|g' /etc/apt/sources.list
                sed -i 's|http://security.ubuntu.com/ubuntu|http://old-releases.ubuntu.com/ubuntu|g' /etc/apt/sources.list
                ;;
            esac
          fi
        fi
        apt-get update
        apt-get install -y --no-install-recommends \
          build-essential \
          ca-certificates \
          cmake \
          git \
          pkg-config \
          can-utils \
          libsocketcan-dev

    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Pack
      working-directory: ${{github.workspace}}/build
      run: cpack .
